<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Final: Automação Total com APIs do IBGE</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; color: #00b37e; }
        p { margin-top: 0; color: #8d8d99; }
        #map-container { position: relative; background: #1c1c1f; border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .estado { stroke: #121214; stroke-width: 1.2; cursor: pointer; transition: all 0.2s ease; }
        .estado:hover { stroke: #fff; stroke-width: 2px; filter: brightness(1.2); }
        .tooltip {
            position: absolute;
            background: rgba(32, 32, 36, 0.95);
            border: 1px solid #00b37e;
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: opacity 0.15s ease;
        }
    </style>
</head>
<body>

    <h1>População Dinâmica do Brasil (APIs IBGE)</h1>
    <p>Aplicação 100% automatizada. Dados e geografia sincronizados em tempo real.</p>

    <div id="map-container">
        <div class="tooltip" id="tooltip"></div>
    </div>

<script>
    const width = 700;
    const height = 650;

    const svg = d3.select("#map-container")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const tooltip = d3.select("#tooltip");

    const ibgeParaSigla = {
        "11": "RO", "12": "AC", "13": "AM", "14": "RR", "15": "PA", "16": "AP", "17": "TO",
        "21": "MA", "22": "PI", "23": "CE", "24": "RN", "25": "PB", "26": "PE", "27": "AL", "28": "SE", "29": "BA",
        "31": "MG", "32": "ES", "33": "RJ", "35": "SP",
        "41": "PR", "42": "SC", "43": "RS",
        "50": "MS", "51": "MT", "52": "GO", "53": "DF"
    };

    const urlMapa = "https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson";
    const urlDados = "https://servicodados.ibge.gov.br/api/v3/agregados/9514/periodos/2022/variaveis/93?localidades=N3[all]";

    const projection = d3.geoMercator()
        .center([-55, -15]) 
        .scale(850)         
        .translate([width / 2, height / 2]);

    const pathGenerator = d3.geoPath().projection(projection);

    Promise.all([
        d3.json(urlMapa),
        d3.json(urlDados)
    ]).then(([geojsonData, estatisticasIbge]) => {

        const populacaoPorSigla = {};
        const resultadosBrutos = estatisticasIbge[0].resultados[0].series;

        resultadosBrutos.forEach(item => {
            const codigoNum = String(item.localidade.id).trim();
            const siglaCorrespondente = ibgeParaSigla[codigoNum];
            
            if (siglaCorrespondente) {
                populacaoPorSigla[siglaCorrespondente] = {
                    nome: item.localidade.nome,
                    populacao: parseInt(item.serie["2022"])
                };
            }
        });

        const valores = Object.values(populacaoPorSigla).map(d => d.populacao);
        const colorScale = d3.scaleSequential()
            .domain([d3.min(valores), d3.max(valores)])
            .interpolator(d3.interpolateBlues);

        svg.append("g")
            .selectAll("path")
            .data(geojsonData.features)
            .enter()
            .append("path")
            .attr("d", pathGenerator)
            .attr("class", "estado")
            .attr("fill", d => {
                const siglaDoMapa = d.properties.sigla; 
                const dados = populacaoPorSigla[siglaDoMapa];
                return dados ? colorScale(dados.populacao) : "#444";
            })
            .on("mouseover", (event, d) => {
                const siglaDoMapa = d.properties.sigla;
                const dados = populacaoPorSigla[siglaDoMapa];
                
                if (dados) {
                    const populacaoFormatada = dados.populacao.toLocaleString('pt-BR');
                    tooltip.style("opacity", 1)
                           .html(`<strong>${dados.nome} (${siglaDoMapa})</strong><br/>População: ${populacaoFormatada} hab.`);
                }
            })
            .on("mousemove", (event) => {
                const [mouseX, mouseY] = d3.pointer(event, svg.node());
                tooltip.style("left", (mouseX + 20) + "px")
                       .style("top", (mouseY) + "px");
            })
            .on("mouseleave", () => {
                tooltip.style("opacity", 0);
            });

    }).catch(error => {
        console.error("Erro na sincronização das APIs:", error);
    });
</script>
</body>
</html>
